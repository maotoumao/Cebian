  <rect x="180" y="76" width="420" height="1" fill="#2a2a4e"/>

  <!-- GitHub Copilot card -->
  <rect x="180" y="86" width="420" height="56" rx="8" fill="#252538"/>
  <circle cx="204" cy="114" r="14" fill="#24292e"/>
  <text x="204" y="119" fill="white" font-size="12" font-family="sans-serif" text-anchor="middle">⊛</text>
  <text x="226" y="108" fill="white" font-size="12" font-family="sans-serif" font-weight="600">GitHub Copilot</text>
  <text x="226" y="124" fill="#6b7280" font-size="11" font-family="sans-serif">Use your Copilot subscription</text>
  <rect x="540" y="100" width="52" height="28" rx="6" fill="url(#accent2)"/>
  <text x="566" y="118" fill="white" font-size="11" font-family="sans-serif" text-anchor="middle">Sign in</text>

  <!-- OpenAI Codex card -->
  <rect x="180" y="150" width="420" height="56" rx="8" fill="#252538"/>
  <circle cx="204" cy="178" r="14" fill="#10a37f"/>
  <text x="204" y="183" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">✦</text>
  <text x="226" y="172" fill="white" font-size="12" font-family="sans-serif" font-weight="600">OpenAI Codex</text>
  <text x="226" y="188" fill="#6b7280" font-size="11" font-family="sans-serif">ChatGPT Plus/Pro subscription</text>
  <rect x="540" y="164" width="52" height="28" rx="6" fill="#2a2a4e"/>
  <text x="566" y="182" fill="#6b7280" font-size="11" font-family="sans-serif" text-anchor="middle">Sign in</text>

  <!-- API Key section -->
  <text x="180" y="228" fill="#6b7280" font-size="10" font-family="sans-serif" font-weight="bold" letter-spacing="1">VIA API KEY</text>
  <rect x="180" y="236" width="420" height="1" fill="#2a2a4e"/>

  <!-- API Key input example -->
  <rect x="180" y="246" width="420" height="56" rx="8" fill="#252538"/>
  <text x="200" y="266" fill="white" font-size="12" font-family="sans-serif" font-weight="600">OpenAI</text>
  <rect x="200" y="275" width="280" height="18" rx="4" fill="#1e1e3e"/>
  <text x="210" y="288" fill="#6b7280" font-size="10" font-family="sans-serif">sk-••••••••••••••••••••••••</text>
  <rect x="488" y="275" width="100" height="18" rx="4" fill="url(#accent2)" opacity="0.8"/>
  <text x="538" y="288" fill="white" font-size="10" font-family="sans-serif" text-anchor="middle">Connected ✓</text>

  <!-- Placeholder label -->
  <text x="400" y="400" fill="#4b5563" font-size="12" font-family="sans-serif" text-anchor="middle">[Settings screenshot placeholder]</text>
