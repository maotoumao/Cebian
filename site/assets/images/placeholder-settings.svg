  <rect x="148" y="0" width="12" height="420" fill="#16213e"/>

  <!-- Nav header -->
  <text x="16" y="36" fill="white" font-size="14" font-family="sans-serif" font-weight="bold">Settings</text>

  <!-- Nav items -->
  <rect x="8" y="52" width="144" height="34" rx="6" fill="url(#accent2)" opacity="0.2"/>
  <rect x="8" y="52" width="3" height="34" rx="1.5" fill="url(#accent2)"/>
  <text x="24" y="73" fill="#93c5fd" font-size="12" font-family="sans-serif">🤖  Providers</text>

  <text x="24" y="110" fill="#6b7280" font-size="12" font-family="sans-serif">📝  Instructions</text>
  <text x="24" y="140" fill="#6b7280" font-size="12" font-family="sans-serif">⚡  Prompts</text>
  <text x="24" y="170" fill="#6b7280" font-size="12" font-family="sans-serif">🧩  Skills</text>
  <text x="24" y="200" fill="#6b7280" font-size="12" font-family="sans-serif">🔌  MCP Servers</text>
  <text x="24" y="230" fill="#6b7280" font-size="12" font-family="sans-serif">⚙  Advanced</text>
  <text x="24" y="260" fill="#6b7280" font-size="12" font-family="sans-serif">ℹ  About</text>

  <!-- Main content area -->
  <rect x="160" y="0" width="480" height="420" fill="#1a1a2e"/>

  <!-- Providers content -->
  <text x="180" y="36" fill="white" font-size="14" font-family="sans-serif" font-weight="bold">AI Providers</text>

  <!-- OAuth section label -->
