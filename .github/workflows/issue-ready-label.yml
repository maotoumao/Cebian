name: Issue Ready Label

# 维护者在 issue 评论区回复 /ready，自动给该 issue 打上准入标签。
# Maintainer replies "/ready" on an issue to grant the implement-ready label.

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  ready-label:
    # 只处理 issue 上的评论，忽略 PR 评论（PR 评论也走 issue_comment 事件）。
    # Only act on real issue comments; PR comments share the same event.
    if: ${{ !github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Apply ready-to-implement label
        uses: actions/github-script@v7
        with:
          script: |
            // ---- 配置 / Config ----
            const MAINTAINER = 'maotoumao';
            const READY_TRIGGER = '/ready';
            const READY_LABEL = 'ready-to-implement';
            const LABEL_COLOR = '0e8a16'; // green

            const body = context.payload.comment.body || '';
            const author = context.payload.comment.user.login;

            // 触发条件：评论第一行（去空格后）正好是 /ready，后续行可写说明。
            // Trigger when the first line (trimmed) is exactly /ready; later lines may add notes.
            const firstLine = body.split(/\r?\n/, 1)[0].trim();
            if (firstLine !== READY_TRIGGER) return;

            // 仅维护者可授予准入标签。
            // Only the maintainer may grant the ready label.
            if (author !== MAINTAINER) {
              core.info(`Ignoring ${READY_TRIGGER} from non-maintainer: ${author}`);
              return;
            }

            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;

            // 标签不存在则创建。
            // Create the label if it does not exist yet.
            try {
              await github.rest.issues.getLabel({ owner, repo, name: READY_LABEL });
            } catch (err) {
              if (err.status === 404) {
                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: READY_LABEL,
                    color: LABEL_COLOR,
                    description: 'Maintainer approved this issue for implementation',
                  });
                } catch (createErr) {
                  // 并发的 /ready 可能已经抢先创建了标签，422 视为成功。
                  // A concurrent /ready may have created it first; treat 422 as success.
                  if (createErr.status !== 422) throw createErr;
                }
              } else {
                throw err;
              }
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: [READY_LABEL],
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: [
                `✅ 已标记为 \`${READY_LABEL}\`，欢迎提交 PR 并在描述里写 \`Closes #${issue_number}\`。`,
                '',
                `✅ Marked as \`${READY_LABEL}\`. You're welcome to open a PR — reference it with \`Closes #${issue_number}\`.`,
              ].join('\n'),
            });
