# Cebian extension i18n — English (default).
# Edit this file along with locales/zh_CN.yml and locales/zh_TW.yml.
# See .agents/skills/i18n-naming/SKILL.md.

# ─── Manifest (flat top-level keys, see skill "Manifest localization") ───
extName: "Cebian"
extDescription: "AI-powered browser sidebar assistant"
actionTitle: "Open Cebian sidebar"

# ─── Common (reused across the UI) ───
common:
  newChat: "New chat"
  send: "Send"
  history: "History"
  toggleTheme: "Toggle theme"
  settings: "Settings"
  back: "Back"
  openInNewTab: "Open in new tab"
  loading: "Loading…"
  cancel: "Cancel"
  confirm: "Confirm"
  save: "Save"
  delete: "Delete"
  rename: "Rename"
  edit: "Edit"
  add: "Add"
  code: "Code"
  copy: "Copy"
  copied: "Copied"
  copyFailed: "Copy failed"
  newFile: "New file"
  newFolder: "New folder"
  search: "Search"
  searchPlaceholder: "Search…"
  moreActions: "More actions"
  empty:
    history: "No history yet"
    folder: "Empty folder"
  time:
    justNow: "Just now"
    # Time labels intentionally use abbreviations (min/h/d/mo/y) to avoid
    # English plural-vs-singular branching at the call site ("1 min ago"
    # reads naturally without a separate 0/1/n map).
    # $1 = number of minutes
    minutesAgo: "$1 min ago"
    # $1 = number of hours
    hoursAgo: "$1 h ago"
    # $1 = number of days
    daysAgo: "$1 d ago"
    # $1 = number of months
    monthsAgo: "$1 mo ago"
    # $1 = number of years
    yearsAgo: "$1 y ago"
  session:
    deleteConfirmTitle: "Delete chat?"
    # $1 = session title
    deleteConfirmDescription: "\"$1\" and its workspace files will be permanently removed. This cannot be undone."
    running: "Agent is running"
    # $1 = message count
    messageCount:
      0: "No messages"
      1: "1 message"
      n: "$1 messages"

# ─── Settings hub ───
settings:
  nav:
    aria: "Settings navigation"
    providers: "Providers"
    instructions: "Instructions"
    prompts: "Prompts"
    skills: "Skills"
    mcp: "MCP Servers"
    advanced: "Advanced"
    about: "About"
  providers:
    title: "AI providers"
  about:
    title: "About"
    tagline: "AI browser sidebar assistant"
    feedback: "Feedback"
    checkUpdate: "Check for updates"
    checking: "Checking…"
    upToDate: "You are on the latest version"
    # $1 = new version string (e.g. "1.2.3")
    updateAvailable: "New version v$1 available"
    viewInstallGuide: "View install guide"
    checkFailed: "Update check failed"
    followAuthor: "Follow the author"
    socials:
      wechat: "WeChat Official Account"
