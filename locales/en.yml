      title: "No MCP servers configured"
      hint: "Add a server to extend the agent with external tools."
    actions:
      add: "Add MCP server"
      toggle: "Enable server"
      edit: "Edit server"
      delete: "Delete server"
      deleteConfirmTitle: "Delete MCP server?"
      # $1 = server name
      deleteConfirmDescription: "\"$1\" will be removed. This cannot be undone."
    errors:
      # $1 = server name
      nameTaken: "An MCP server named \"$1\" already exists."
      nameRequired: "Server name is required."
      urlRequired: "Server URL is required."
      # $1 = URL
      urlInvalid: "Invalid server URL: $1"
      # $1 = scheme (e.g. "ftp:")
      urlScheme: "Unsupported URL scheme: $1"
      bearerTokenRequired: "Bearer token is required."
      authHeaderConflict: "Do not set the Authorization header manually when using bearer auth — set the token in the auth field instead."
    status:
      disabled: "Disabled"
      idle: "Awaiting first call"
      connected: "Connected"
      disconnected: "Disconnected"
      probing: "Reconnecting"
      circuitOpen: "Unavailable"
    form:
      name: "Name"
      namePlaceholder: "e.g. weather, github, my-tools"
      transport: "Transport"
      url: "URL"
      urlPlaceholder: "https://example.com/mcp"
      authType: "Authentication"
      authNone: "None"
      authBearer: "Bearer token"
      bearerToken: "Token"
      bearerTokenPlaceholder: "Paste bearer token"
      headers: "Custom headers"
      headerKeyPlaceholder: "Header name (e.g. X-MCP-Toolsets)"
      headerValuePlaceholder: "Header value"
      addHeader: "Add header"
      removeHeader: "Remove header"
  editor:
    selectFile: "Select a file to start editing"
    saving: "Saving…"
    saveFailed: "Save failed"
    unsaved: "Unsaved"
    saved: "Saved"
  files:
    backToList: "Back to file list"
    selectOrCreate: "Select or create a file from the left"

# ─── Chat surface ───
chat:
  composer:
    placeholder: "Type '/' for commands…"
    pickElement: "Pick element"
    cancelPick: "Cancel pick"
    screenshot: "Screenshot"
    uploadFile: "Upload file"
    mobileMode: "Mobile mode"
    needModel: "Please select an AI model first"
    goToSettings: "Go to settings"
    readPromptFailed: "Failed to read prompt"
    elementAdded: "Element already added"
    elementPickFailed: "Failed to pick element"
    elementPickUnsupported: "Element picker isn't supported on this page"
    elementPickNavigated: "Element picker cancelled — the page navigated"
    imageAlreadyAdded: "Image already added"
    screenshotFailed: "Screenshot failed"
    # $1 = max attachment count
    maxAttachments: "Up to $1 attachments"
    # $1 = number of files actually added
    truncatedFiles: "Only added the first $1 file(s); limit reached"
    # $1 = file name, $2 = size limit (formatted, e.g. "5 MB")
    fileTooLarge: "$1 exceeds $2"
    # $1 = file name
    readFileFailed: "Failed to read: $1"
    # $1 = file name
    unsupportedFileType: "Unsupported file type: $1"
    noPrompts: "No prompts yet — create one from AI config"
    noMatch: "No matches"
    iframeEnterHint: "⏎ enter"
  attachments:
    image: "Image"
    screenshot: "Screenshot"
    imageAlt: "Attachment image"
    # $1 = event count, $2 = formatted duration (M:SS)
    recordingMeta: "$1 events · $2"
    recordingTruncated: "truncated"
    recordingDownload: "Download recording JSON"
    # $1 = event count, $2 = compact char count (e.g. 1.2K, 3M)
    recordingHover: "$1 events · ~$2 chars"
  recorder:
    start: "Start recording user actions"
    stop: "Stop recording (will attach to next message)"
    startRejectedBusy: "Another sidepanel is already recording. Stop it first to start a new recording."
    autoStoppedEvents: "Recording auto-stopped: event limit reached"
    autoStoppedTime: "Recording auto-stopped: time limit reached"
  askUser:
    placeholder: "Type a reply…"
  model:
    select: "Select model"
    searchPlaceholder: "Search models…"
    notFound: "No models found"
    addMore: "Open settings to add more providers"
  thinking:
    # $1 = current level label
    label: "Thinking: $1"
    levels:
      "off": "Off"
      minimal: "Minimal"
      low: "Low"
      medium: "Medium"
      high: "High"
  tool:
    args: "Arguments"
    result: "Result"
  message:
    # $1 = input tokens (formatted, e.g. "1.2k"), $2 = output tokens (formatted)
    tokensInOut: "↑$1 ↓$2"
    # Cache breakdown without write. $1 = uncached, $2 = cache hit (both formatted)
    tokensInBreakdownHit: "uncached $1 · cached $2"
    # Cache breakdown with write. $1 = uncached, $2 = cache hit, $3 = cache write (all formatted)
    tokensInBreakdownHitWrite: "uncached $1 · cached $2 · write $3"
  session:
    loading: "Loading session…"
    modelError: "Model returned an error"
    welcomeReady: "What can I help you with?"
    scrollToBottom: "Jump to latest"

