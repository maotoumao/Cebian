  runSkill: "Running skill script $1"
  # $1 = MCP server slug (display form), $2 = remote tool name
  mcpCall: "$1 · $2"
  fs:
    # $1 = file path
    createFile: "Creating file $1"
    # $1 = file path
    editFile: "Editing file $1"
    # $1 = directory path
    mkdir: "Creating directory $1"
    # $1 = old path
    rename: "Renaming $1"
    # $1 = path
    delete: "Deleting $1"
    # $1 = file path
    readFile: "Reading file $1"
