    label: "Custom instructions"
    hint: "Appended after the default rules. Use it to adjust language, tone, or persona. Cannot override tool protocols or safety rules."
    placeholder: "e.g.\n- Reply in English\n- Keep answers concise\n- Default to TypeScript when discussing code"
  prompts:
    title: "Prompts"
    newBody: "(Write your prompt here)"
    # $1 = trigger character ("/")
    hint: "Reusable prompt templates. Trigger them with $1 in the chat input."
    placeholders:
      selectedText: "Selected text on page"
      pageUrl: "Current page URL"
      pageTitle: "Current page title"
      date: "Current date"
      clipboard: "Clipboard content"
