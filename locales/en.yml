      keepBoth: "Import as new"
      confirmOverwriteTitle: "Overwrite existing skill?"
      # $1 = skill name(s), comma-separated
      confirmOverwriteDescription: "\"$1\" will be replaced and its saved permissions will be cleared. Continue?"
